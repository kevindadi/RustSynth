# Task configuration for toy_api synthesizer test
# Goal: Synthesize code that uses Counter API to produce i32

[inputs]
doc_json = "target/doc/toy_api.json"

[search]
stack_depth = 8
default_place_bound = 3
max_steps = 50

[search.place_bounds]
"own_i32" = 3
"own_Counter" = 2

[filter]
# Disable primitive creation - force using Counter API
deny = ["const_i32", "const_()"]

# Only allow Counter-related functions
allow = [
  "make_counter",
  "Counter::new",
  "Counter::inc",
  "Counter::dec",
  "Counter::get",
  "Counter::with_value",
  "Counter::into_value",
]

[goal]
# Goal: Get an owned i32 (must come from Counter now)
want = "own i32"
count = 1
