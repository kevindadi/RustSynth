# Task configuration for toy_api synthesizer test

[inputs]
doc_json = "target/doc/toy_api.json"

[search]
stack_depth = 8
default_place_bound = 2
max_steps = 100

# Override bounds for specific places
[search.place_bounds]
"own_i32" = 3
"own_Counter" = 2

[filter]
# Only allow these functions/methods
allow = [
  "make_counter",
  "Counter::new",
  "Counter::inc",
  "Counter::dec",
  "Counter::get",
  "Counter::reset",
  "Counter::with_value",
]

[goal]
# We want to produce an owned i32
want = "own i32"
count = 1

[initial]
# Initial tokens (optional)
# tokens = [{ type = "i32", count = 1 }]
