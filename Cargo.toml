[package]
name = "rustdoc-petri-net-builder"
version = "56.2.0"
edition = "2024"
authors = ["Kevin Zhang <zhangkaiwenyy@gmail.com>"]
license = "Apache-2.0 OR MIT"
description = "Rustdoc Petri Net Builder"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
rustdoc-types = "0.57.0"
chrono = "0.4.42"
petgraph = { version = "0.6", features = ["serde-1"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
log = "0.4"
env_logger = "0.11"
simplelog = "0.12.0"
anyhow = "1.0"

[lints.clippy]
collapsible_if = "allow"
